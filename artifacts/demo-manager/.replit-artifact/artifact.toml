kind = "web"
previewPath = "/"
title = "FACEIT Demo Manager"
version = "1.0.0"
id = "artifacts/demo-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22039

[services.development]
run = "pnpm --filter @workspace/demo-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/demo-manager", "run", "build" ]
publicDir = "artifacts/demo-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22039"
BASE_PATH = "/"
